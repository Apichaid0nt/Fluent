name: Build and Commit

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup PNPM
      uses: pnpm/action-setup@v2.2.4
      with:
        version: 7.25.1
        run_install: true

    - name: Setup Aftman
      uses: ok-nick/setup-aftman@v0.3.0

    - name: Install Rojo, Lune and DarkLua
      run: aftman install

    - name: Build rbxm
      run: pnpm run rojo --verbose

    - name: Bundle to main.lua
      run: pnpm run bundle

    - name: Commit dist/main.lua back to repo
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add dist/main.lua dist/main.rbxm
        git diff --cached --quiet || git commit -m "build: auto-bundle [skip ci]"
        git push
